name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    name: Bump, tag & release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      # ── Version bump ────────────────────────────────────────────
      - name: Compute new version
        id: version
        run: |
          CURRENT=$(grep '^version' trading-bot/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW"

      - name: Update Cargo.toml
        run: |
          sed -i "s/^version = \"${{ steps.version.outputs.current }}\"/version = \"${{ steps.version.outputs.new }}\"/" trading-bot/Cargo.toml
          sed -i "s/^version = \"${{ steps.version.outputs.current }}\"/version = \"${{ steps.version.outputs.new }}\"/" copy-trading-bot/Cargo.toml

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading-bot/Cargo.toml copy-trading-bot/Cargo.toml Cargo.lock
          git commit -m "release: ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD "${{ steps.version.outputs.tag }}"

      # ── GitHub release ──────────────────────────────────────────
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true

  docker:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install musl toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: musl-release

      - name: Build release binaries
        run: cargo build --workspace --release --target x86_64-unknown-linux-musl

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push trading-bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag }}

      - name: Build and push copy-trading-bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.copy-trading
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-copy:latest
            ghcr.io/${{ github.repository }}-copy:${{ needs.release.outputs.tag }}

      - name: Prune old images (keep last 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: polymarket-bot
          package-type: container
          min-versions-to-keep: 3
          delete-untagged-versions: true

      - name: Prune old copy-trading-bot images (keep last 3)
        uses: actions/delete-package-versions@v5
        with:
          package-name: polymarket-bot-copy
          package-type: container
          min-versions-to-keep: 3
          delete-untagged-versions: true

  deploy:
    name: Deploy to Hetzner
    needs: docker
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
