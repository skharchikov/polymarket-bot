name: Deploy

on:
  workflow_call:
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/polymarket-bot

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to Hetzner
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

      - name: Write .env on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        run: |
          printf '%s\n' "$DEPLOY_ENV" | ssh -i ~/.ssh/deploy_key "deploy@$DEPLOY_HOST" "cat > $DEPLOY_DIR/.env"

      - name: Copy files to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --include='docker-compose.yml' \
            --include='Dockerfile' \
            --include='Cargo.toml' \
            --include='Cargo.lock' \
            --include='rust-toolchain.toml' \
            --include='src/***' \
            --include='migrations/***' \
            --include='scripts/***' \
            --exclude='*' \
            ./ "deploy@$DEPLOY_HOST:$DEPLOY_DIR/"

      - name: Build and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key "deploy@$DEPLOY_HOST" "\
            cd $DEPLOY_DIR && \
            docker compose build --no-cache && \
            docker compose up -d && \
            docker compose logs --tail=20 bot"
