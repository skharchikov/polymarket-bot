name: Deploy

on:
  workflow_call:
  workflow_dispatch:

env:
  DEPLOY_DIR: /opt/polymarket-bot
  IMAGE: ghcr.io/skharchikov/polymarket-bot:latest
  IMAGE_COPY: ghcr.io/skharchikov/polymarket-bot-copy:latest

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            RANGE="${TAG}..HEAD"
          else
            RANGE="HEAD~10..HEAD"
          fi
          {
            echo "$TAG"
            git log "$RANGE" --oneline --no-decorate | while read -r line; do
              echo "• ${line#* }"
            done
          } > CHANGELOG.gen

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

      - name: Write .env on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_ENV: ${{ secrets.DEPLOY_ENV }}
        run: |
          printf '%s\n' "$DEPLOY_ENV" | ssh -i ~/.ssh/deploy_key "deploy@$DEPLOY_HOST" "cat > $DEPLOY_DIR/.env"

      - name: Copy files to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            --include='docker-compose.yml' \
            --include='CHANGELOG.gen' \
            --include='scripts/***' \
            --include='migrations/***' \
            --include='monitoring/***' \
            --exclude='*' \
            ./ "deploy@$DEPLOY_HOST:$DEPLOY_DIR/"

      - name: Pull image and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=40 \
            "deploy@$DEPLOY_HOST" "\
            echo $GHCR_PAT | docker login ghcr.io -u skharchikov --password-stdin && \
            cd $DEPLOY_DIR && \
            docker pull $IMAGE && \
            docker pull $IMAGE_COPY && \
            docker compose build model-server && \
            docker compose up -d && \
            docker compose logs --tail=20 bot copy-trading-bot"
