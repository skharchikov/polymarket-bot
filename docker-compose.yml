services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: polymarket
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d polymarket"]
      interval: 5s
      timeout: 3s
      retries: 5

  model-server:
    build:
      context: scripts
    entrypoint: ["python"]
    command: ["serve_model.py"]
    environment:
      MODEL_DIR: /model
      MODEL_PORT: "8000"
    volumes:
      - model:/model
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      model-server:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgres://bot:bot@postgres:5432/polymarket
      MODEL_SIDECAR_URL: http://model-server:8000
    volumes:
      - model:/app/model
    restart: unless-stopped

  trainer:
    build:
      context: scripts
    command: ["/bin/sh", "retrain.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bot:bot@postgres:5432/polymarket
    volumes:
      - model:/model
    restart: "no"
    # Run manually or via cron: docker compose run trainer
    profiles:
      - train

volumes:
  pgdata:
  model:
