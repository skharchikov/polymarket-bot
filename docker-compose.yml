services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: polymarket
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d polymarket"]
      interval: 5s
      timeout: 3s
      retries: 5

  model-server:
    build:
      context: scripts
    command: ["serve_model.py"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://bot:bot@postgres:5432/polymarket
      MODEL_DIR: /model
      MODEL_PORT: "8000"
      RETRAIN_MAX_AGE_HOURS: "24"
      RETRAIN_ON_SCHEDULE: "true"
    volumes:
      - model:/model
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  bot:
    image: ghcr.io/skharchikov/polymarket-bot:latest
    depends_on:
      postgres:
        condition: service_healthy
      model-server:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://bot:bot@postgres:5432/polymarket
      MODEL_SIDECAR_URL: http://model-server:8000
      METRICS_PORT: "9000"
    volumes:
      - model:/app/model
    ports:
      - "9000:9000"
    stop_grace_period: 15s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
  model:
  prometheus_data:
  grafana_data:
