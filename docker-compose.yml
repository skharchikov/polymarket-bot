services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: polymarket
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d polymarket"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://bot:bot@postgres:5432/polymarket
    restart: unless-stopped

volumes:
  pgdata:
